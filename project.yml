name: FreelancerEFKA
options:
  bundleIdPrefix: com.freelancerefka
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Resources/Info.plist
    DEVELOPMENT_TEAM: ""

targets:
  FreelancerEFKA:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freelancerefka.app
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
